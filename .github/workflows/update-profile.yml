# Nightly refresh of the profile card: recomputes Uptime (age) and refetches
# GitHub/LeetCode stats, then redraws profile-dark.svg / profile-light.svg.
# Commits only when something actually changed.
name: Update profile card

on:
  schedule:
    - cron: "45 0 * * *"   # ~06:15 IST daily (GitHub cron is best-effort)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_profile.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-dark.svg profile-light.svg stats.json
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "chore: refresh profile card ($(date -u +%F))"
          git push
